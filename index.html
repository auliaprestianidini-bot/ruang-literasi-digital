<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruang Literasi Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#a7f3d0,#93c5fd);
  color:#0f172a;
}

header{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(10px);
  padding:12px;
  display:flex;
  justify-content:center;
  gap:20px;
  position:sticky;
  top:0;
}

header a{
  text-decoration:none;
  font-weight:600;
  color:#0f172a;
}

section{
  max-width:900px;
  margin:40px auto;
  background:white;
  padding:25px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.book{
  background:#f8fafc;
  padding:15px;
  margin:12px 0;
  border-radius:14px;
  border:1px solid #e2e8f0;
}

button{
  margin-top:8px;
  background:#10b981;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#059669;
}

button.red{
  background:red;
}
</style>
</head>

<body>

<header>
  <a href="#beranda">Beranda</a>
  <a href="#koleksi">Koleksi</a>
  <a href="#viewer">Baca</a>
  <a href="#rak">Rak</a>
</header>

<!-- BERANDA -->
<section id="beranda">
  <h1>📚 Ruang Literasi Digital</h1>
  <p>Website membaca buku digital sederhana.</p>
</section>

<!-- KOLEKSI -->
<section id="koleksi">
  <h2>📖 Koleksi Buku</h2>

    </button>
  </div>

  <div class="book">
    <h3>Sungguh, Kau Boleh Pergi</h3>

    <button onclick="simpan('Sungguh, Kau Boleh Pergi')">
      Simpan ke Rak
    </button>

    <button onclick="bukaBuku('boleh.pdf')">
      📖 Baca Buku
    </button>
  </div>

</section>

<!-- VIEWER -->
<section id="viewer" style="display:none;">
  <h2>📖 Mode Baca</h2>

  <iframe id="pdfViewer"
    style="width:100%; height:80vh; border:none; border-radius:12px;">
  </iframe>

  <br><br>

  <button class="red" onclick="tutupBuku()">
    Tutup Buku
  </button>
</section>

<!-- RAK -->
<section id="rak">
  <h2>📌 Rak Saya</h2>
  <ul id="rakList"></ul>

  <button class="red" onclick="resetRak()">
    Reset Rak
  </button>
</section>

<script>

function simpan(buku){
  let rak = JSON.parse(localStorage.getItem("rak")) || [];

  if(!buku || buku.trim() === "") return;

  buku = buku.trim();

  if(rak.includes(buku)) return;

  rak.push(buku);
  localStorage.setItem("rak", JSON.stringify(rak));

  tampilkan();
}

function tampilkan(){
  let rak = JSON.parse(localStorage.getItem("rak")) || [];
  let list = document.getElementById("rakList");

  list.innerHTML = "";

  if(rak.length === 0){
    list.innerHTML = "<li>📭 Rak masih kosong</li>";
    return;
  }

  rak.forEach((b, i) => {
    list.innerHTML += `
      <li>
        📚 ${b}
        <button onclick="hapus(${i})" class="red" style="margin-left:10px;padding:4px 8px;">
          Hapus
        </button>
      </li>
    `;
  });
}

function hapus(i){
  let rak = JSON.parse(localStorage.getItem("rak")) || [];
  rak.splice(i,1);
  localStorage.setItem("rak", JSON.stringify(rak));
  tampilkan();
}

function resetRak(){
  localStorage.removeItem("rak");
  tampilkan();
}

// ===== VIEWER BUKU =====
function bukaBuku(file){
  document.getElementById("viewer").style.display = "block";
  document.getElementById("pdfViewer").src = file;
  window.scrollTo(0, document.body.scrollHeight);
}

function tutupBuku(){
  document.getElementById("viewer").style.display = "none";
  document.getElementById("pdfViewer").src = "";
}

tampilkan();

</script>

</body>
</html>

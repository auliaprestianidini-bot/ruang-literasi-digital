<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruang Literasi Digital</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

header {
  background: #6c63ff;
  padding: 15px;
}

nav ul {
  display: flex;
  gap: 15px;
  list-style: none;
  margin: 0;
  padding: 0;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

section {
  padding: 20px;
}

.book {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
}

button {
  margin-top: 5px;
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: #6c63ff;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <nav>
    <ul>
      <li><a href="#beranda">Beranda</a></li>
      <li><a href="#koleksi">Koleksi</a></li>
      <li><a href="#rak">Rak Saya</a></li>
      <li><a href="#tentang">Tentang</a></li>
    </ul>
  </nav>
</header>

<section id="beranda">
  <h2>Beranda</h2>
  <p>Selamat datang di Ruang Literasi Digital 📚</p>
</section>

<section id="koleksi">
  <h2>Koleksi Buku</h2>

  <div class="book">
    <h3>Bumi</h3>
    <p>Tere Liye</p>
    <button onclick="simpan('Bumi')">Simpan ke Rak</button>
  </div>

  <div class="book">
    <h3>Laut Bercerita</h3>
    <p>Leila S. Chudori</p>
    <button onclick="simpan('Laut Bercerita')">Simpan ke Rak</button>
  </div>

  <div class="book">
    <h3>Filosofi Teras</h3>
    <p>Henry Manampiring</p>
    <button onclick="simpan('Filosofi Teras')">Simpan ke Rak</button>
  </div>

</section>

<section id="rak">
  <h2>Rak Saya</h2>
  <ul id="rakList"></ul>
</section>

<section id="tentang">
  <h2>Tentang</h2>
  <p>Website literasi digital sederhana.</p>
</section>

<script>
function simpan(buku) {
  let rak = JSON.parse(localStorage.getItem("rak")) || [];
  rak.push(buku);
  localStorage.setItem("rak", JSON.stringify(rak));
  tampilkan();
}

function tampilkan() {
  let rak = JSON.parse(localStorage.getItem("rak")) || [];
  let list = document.getElementById("rakList");
  list.innerHTML = "";

  rak.forEach(buku => {
    list.innerHTML += "<li>" + buku + "</li>";
  });
}

tampilkan();
</script>

</body>
</html>

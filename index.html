<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruang Literasi Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#a7f3d0,#93c5fd);
  color:#0f172a;
}

/* NAV */
header{
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  padding:12px;
  display:flex;
  justify-content:center;
  gap:20px;
  position:sticky;
  top:0;
}

header a{
  text-decoration:none;
  color:#0f172a;
  font-weight:600;
}

/* SECTION */
section{
  max-width:900px;
  margin:40px auto;
  background:white;
  padding:25px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* BOOK CARD */
.book{
  background:#f8fafc;
  padding:15px;
  margin:12px 0;
  border-radius:14px;
  border:1px solid #e2e8f0;
}

button{
  margin-top:8px;
  background:#10b981;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#059669;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header>
  <a href="#beranda">Beranda</a>
  <a href="#koleksi">Koleksi</a>
  <a href="#rak">Rak Saya</a>
  <a href="#tentang">Tentang</a>
</header>

<!-- BERANDA -->
<section id="beranda">
  <h1>📚 Ruang Literasi Digital</h1>
  <p>Tempat membaca dan menyimpan buku digital dengan nyaman dan sederhana.</p>
</section>

<!-- KOLEKSI -->
<section id="koleksi">
  <h2>📖 Koleksi Buku</h2>

  <div class="book">
    <h3>Daun yang Jatuh Tak Pernah Membenci Angin</h3>

    <button onclick="simpan('Daun yang Jatuh Tak Pernah Membenci Angin')">
      Simpan ke Rak
    </button>

    <button onclick="baca('https://auliaprestianidini-bot.github.io/ruang-literasi-digital/daun.pdf')">
      📖 Baca Buku
    </button>
  </div>

</section>

<!-- RAK -->
<section id="rak">
  <h2>📌 Rak Saya</h2>
  <ul id="rakList"></ul>
</section>

<!-- TENTANG -->
<section id="tentang">
  <h2>ℹ️ Tentang</h2>
  <p>Website literasi digital sederhana.</p>
</section>

<script>
function simpan(buku){
  let rak = JSON.parse(localStorage.getItem("rak")) || [];
  rak.push(buku);
  localStorage.setItem("rak", JSON.stringify(rak));
  tampilkan();
}

function tampilkan(){
  let rak = JSON.parse(localStorage.getItem("rak")) || [];
  let list = document.getElementById("rakList");
  list.innerHTML="";
  rak.forEach(b=>{
    list.innerHTML += "<li>"+b+"</li>";
  });
}

function baca(link){
  window.open(link, "_blank");
}

tampilkan();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruang Literasi Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#a7f3d0,#93c5fd);
  color:#0f172a;
}

header{
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  padding:12px;
  display:flex;
  justify-content:center;
  gap:20px;
  position:sticky;
  top:0;
}

header a{
  text-decoration:none;
  color:#0f172a;
  font-weight:600;
}

section{
  max-width:900px;
  margin:40px auto;
  background:white;
  padding:25px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.book{
  background:#f8fafc;
  padding:15px;
  margin:12px 0;
  border-radius:14px;
  border:1px solid #e2e8f0;
}

button{
  margin-top:8px;
  background:#10b981;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#059669;
}

button.delete{
  background:red;
  margin-left:10px;
  padding:4px 8px;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <a href="#beranda">Beranda</a>
  <a href="#koleksi">Koleksi</a>
  <a href="#rak">Rak Saya</a>
  <a href="#tentang">Tentang</a>
</header>

<section id="beranda">
  <h1>📚 Ruang Literasi Digital</h1>
  <p>Tempat membaca dan menyimpan buku digital.</p>
</section>

<section id="koleksi">
  <h2>📖 Koleksi Buku</h2>

  <div class="book">
    <h3>Daun yang Jatuh Tak Pernah Membenci Angin</h3>

    <button onclick="simpan('Daun yang Jatuh Tak Pernah Membenci Angin')">
      Simpan ke Rak
    </button>

    <button onclick="baca('https://example.com')">
      📖 Baca Buku
    </button>
  </div>

</section>

<section id="rak">
  <h2>📌 Rak Saya</h2>
  <ul id="rakList"></ul>
  <button onclick="resetRak()" style="background:red;margin-top:10px;">
    Reset Rak
  </button>
</section>

<section id="tentang">
  <h2>ℹ️ Tentang</h2>
  <p>Website literasi digital sederhana.</p>
</section>

<script>
function simpan(buku){
  let rak = JSON.parse(localStorage.getItem("rak")) || [];

  if(!buku || buku.trim() === "") return;

  buku = buku.trim();

  if(rak.includes(buku)) return;

  rak.push(buku);
  localStorage.setItem("rak", JSON.stringify(rak));

  tampilkan();
}

function tampilkan(){
  let rak = JSON.parse(localStorage.getItem("rak")) || [];
  let list = document.getElementById("rakList");

  list.innerHTML = "";

  if(rak.length === 0){
    list.innerHTML = "<li>📭 Rak masih kosong</li>";
    return;
  }

  rak.forEach((b, i) => {
    list.innerHTML += `
      <li>
        📚 ${b}
        <button class="delete" onclick="hapus(${i})">Hapus</button>
      </li>
    `;
  });
}

function hapus(i){
  let rak = JSON.parse(localStorage.getItem("rak")) || [];
  rak.splice(i, 1);
  localStorage.setItem("rak", JSON.stringify(rak));
  tampilkan();
}

function resetRak(){
  localStorage.removeItem("rak");
  tampilkan();
}

function baca(link){
  window.open(link, "_blank");
}

tampilkan();
</script>

</body>
</html>
